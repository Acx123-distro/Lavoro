kind = "web"
previewPath = "/"
title = "Lavoro — Ghana's Trusted Marketplace"
version = "1.0.0"
id = "artifacts/lavoro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22823

[services.development]
run = "pnpm --filter @workspace/lavoro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lavoro", "run", "build" ]
publicDir = "artifacts/lavoro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22823"
BASE_PATH = "/"
